<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Tracker Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar collapsed" id="sidebar">
  <div class="logo">JT</div>

  <ul>
    <li onclick="navigate('home')">🏠 <span>Home</span></li>
    <li onclick="navigate('tracker')">📊 <span>Tracker</span></li>
    <li onclick="navigate('account')">👤 <span>Account</span></li>
    <li onclick="navigate('help')">❓ <span>Help</span></li>
  </ul>
</div>

<div class="main">

  <div class="topbar">
    <button id="toggleBtn">☰</button>
    <input type="text" id="search" placeholder="Search jobs...">

    <select id="sort">
      <option value="latest">Latest</option>
      <option value="oldest">Oldest</option>
      <option value="company">Company</option>
    </select>

    <button id="themeToggle">🌙</button>
  </div>

  <section id="homeSection">
    <h1>Dashboard</h1>

    <div class="charts">
      <div class="chart-box">
        <canvas id="doughnutChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </section>

  <section id="trackerSection">

    <div class="stats">
      <div class="card">Total <span id="total">0</span></div>
      <div class="card">Offers <span id="offers">0</span></div>
      <div class="card">Rejected <span id="rejected">0</span></div>
    </div>

    <div class="form">
      <input id="company" placeholder="Company">
      <input id="role" placeholder="Role">

      <select id="status">
        <option>Applied</option>
        <option>Interview</option>
        <option>Rejected</option>
        <option>Offer</option>
      </select>

      <button id="addBtn">Add</button>
      <button id="exportCSV">Export</button>
    </div>


    <div class="filters">
      <button data="All">All</button>
      <button data="Applied">Applied</button>
      <button data="Interview">Interview</button>
      <button data="Rejected">Rejected</button>
      <button data="Offer">Offer</button>
    </div>

    <div class="kanban">
      <div class="column" data-status="Applied"><h3>Applied</h3></div>
      <div class="column" data-status="Interview"><h3>Interview</h3></div>
      <div class="column" data-status="Offer"><h3>Offer</h3></div>
      <div class="column" data-status="Rejected"><h3>Rejected</h3></div>
    </div>

  </section>

  
  <footer>© 2026 Job Tracker Made By-Gaurav</footer>

</div>

<script src="app.js"></script>
</body>
</html>
