<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Tracker Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar collapsed" id="sidebar">
  <div class="logo">💼</div>

  <ul>
    <li onclick="navigate('home')">🏠 <span>Home</span></li>
    <li onclick="navigate('tracker')">📊 <span>Job Tracker</span></li>
    <li onclick="navigate('account')">👤 <span>Account</span></li>
    <li onclick="navigate('help')">❓ <span>Help</span></li>
  </ul>
</div>

 <div class="main">

   <div class="topbar">
    <button id="toggleBtn">☰</button>
     <input type="text" id="search" placeholder="Search jobs...">
    <button id="themeToggle">🌙</button>
   </div>

   <section id="homeSection">
    <h1>Dashboard Overview 🚀</h1>
    <p>Track your job applications smartly</p>
    <canvas id="chart" class="element.style"></canvas>
  </section>

   <section id="trackerSection">

    <div class="stats">
      <div class="card">Total <span id="total">0</span></div>
      <div class="card">Offers <span id="offers">0</span></div>
      <div class="card">Rejected <span id="rejected">0</span></div>
    </div>

    <div class="form">
      <input id="company" placeholder="Company">
      <input id="role" placeholder="Role">

      <select id="status">
        <option>Applied</option>
        <option>Interview</option>
        <option>Rejected</option>
        <option>Offer</option>
      </select>

      <button id="addBtn">Add</button>
      <button id="exportCSV">Export CSV</button>
    </div>

    <div class="filters">
      <button data="All">All</button>
      <button data="Applied">Applied</button>
      <button data="Interview">Interview</button>
      <button data="Rejected">Rejected</button>
      <button data="Offer">Offer</button>
    </div>

     <div class="kanban">
      <div class="column" data="Applied"><h3>Applied</h3></div>
      <div class="column" data="Interview"><h3>Interview</h3></div>
      <div class="column" data="Offer"><h3>Offer</h3></div>
      <div class="column" data="Rejected"><h3>Rejected</h3></div>
     </div>

  </section>

  <footer>© 2026 Job Tracker Pro</footer>

</div>

<script src="app.js"></script>
</body>
</html>
